<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민쌤영어 Vocab · Set 02</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0F1A;
    --surface: #131929;
    --surface-hover: #192136;
    --accent: #7CA7EB;
    --accent-glow: rgba(124, 167, 235, 0.25);
    --accent-dim: rgba(124,167,235,0.14);
    --accent-border: rgba(124,167,235,0.28);
    --text: #F0EEE8;
    --text-muted: rgba(240,238,232,0.55);
    --text-dim: rgba(240,238,232,0.25);
    
    /* 카드 뒷면 프리미엄 라이트 테마 변수 */
    --back-bg: #F7F5F0;
    --back-text: #111111;
    --back-muted: #555555;
    --back-rule: rgba(0,0,0,0.06);
    --back-ex-bg: rgba(11,15,26,0.04);
    
    --radius: 22px;
    --card-w: 400px;
    --card-h: 540px;
    
    /* 폰트 스택 최적화 */
    --font-ko: 'Pretendard', 'Malgun Gothic', sans-serif;
  }

  body {
    background: var(--bg);
    background: radial-gradient(circle at top center, #161f36 0%, var(--bg) 70%);
    color: var(--text);
    font-family: 'DM Sans', var(--font-ko);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 900px;
    padding: 2.5rem 2rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 2rem;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .home-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    text-decoration: none;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
  }
  .home-btn:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .brand { 
    font-size: 14px; 
    letter-spacing: 0.14em; 
    color: var(--accent); 
    font-weight: 600; 
    text-transform: uppercase; 
  }
  .set-label { 
    font-size: 13px; 
    color: var(--text-muted); 
    font-weight: 500;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.8rem;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a0c4ff);
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-text {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* ── CARD STAGE ── */
  .stage {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 2000px;
    cursor: pointer;
    outline: none;
    margin-bottom: 0.5rem;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 5px 15px rgba(0, 0, 0, 0.2);
    border-radius: var(--radius);
  }
  
  /* 마우스 오버 및 활성화 상태 입체감 증폭 */
  .stage:hover .card {
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px var(--accent-glow);
  }
  .stage:focus-visible .card { 
    box-shadow: 0 0 0 3px var(--accent); 
  }

  /* 카드 플립 애니메이션 조정 (그림자 반전 포함) */
  .card.flipped { 
    transform: rotateY(180deg); 
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── FRONT ── */
  .front {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .front-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px 0;
  }
  .front-label { 
    font-size: 11px; 
    letter-spacing: 0.14em; 
    text-transform: uppercase; 
    color: var(--text-dim); 
    font-weight: 600; 
  }
  .pos-pill {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .front-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px 34px;
  }
  .sentence {
    font-size: 19px;
    line-height: 1.8;
    color: rgba(240,238,232,0.92);
    font-weight: 400;
    word-break: keep-all;
  }
  .sentence .hw {
    font-size: calc(19px * 1.25);
    font-weight: 700;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    display: inline;
    border-bottom: 2px dashed var(--accent-border);
    padding-bottom: 2px;
  }
  .front-footer {
    padding: 0 30px 24px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .deco-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, #a0c4ff 60%, transparent 100%);
  }

  /* ── BACK ── */
  .back {
    background: var(--back-bg);
    transform: rotateY(180deg);
  }
  .back-header {
    background: #0B0F1A;
    padding: 24px 28px 20px;
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .back-word {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .back-pos { 
    font-size: 12px; 
    color: var(--accent); 
    letter-spacing: 0.1em; 
    font-weight: 600; 
  }
  
  /* 콘텐츠가 길어질 경우 대비한 내부 스크롤바 최적화 */
  .back-body {
    flex: 1;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
  }
  .back-body::-webkit-scrollbar {
    width: 5px;
  }
  .back-body::-webkit-scrollbar-thumb {
    background-color: rgba(0, 0, 0, 0.15);
    border-radius: 99px;
  }
  
  .meaning-block { 
    display: flex; 
    flex-direction: column; 
    gap: 4px; 
  }
  .meaning-num { 
    font-size: 10px; 
    color: #185FA5; 
    font-weight: 700; 
    letter-spacing: 0.08em; 
  }
  .meaning-text { 
    font-size: 15.5px; 
    color: var(--back-text); 
    font-weight: 600; 
    line-height: 1.5; 
    word-break: keep-all; 
    overflow-wrap: break-word; 
    font-family: var(--font-ko);
  }
  
  .rule { 
    height: 1px; 
    background: var(--back-rule); 
    margin: 4px 0;
  }
  .ex-block {
    background: var(--back-ex-bg);
    border-left: 4px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ex-eng { 
    font-size: 13.5px; 
    color: #2b2b2b; 
    line-height: 1.65; 
  }
  .ex-eng strong { 
    color: #185FA5; 
    font-weight: 700; 
    font-family: 'Playfair Display', serif;
    font-size: 14.5px;
  }
  .ex-kor { 
    font-size: 13px; 
    color: #000000; 
    font-weight: 700; 
    line-height: 1.6; 
    font-family: var(--font-ko);
    word-break: keep-all;
  }
  
  .back-deco {
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, rgba(124,167,235,0.4) 40%, var(--accent) 100%);
  }

  /* ── NAVIGATION ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 2rem;
  }
  .nav-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    font-family: 'DM Sans', var(--font-ko);
    font-size: 13px;
    font-weight: 600;
    padding: 11px 26px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .nav-btn:hover:not(:disabled) { 
    background: rgba(255,255,255,0.08); 
    border-color: rgba(255,255,255,0.2); 
    color: var(--text); 
  }
  .nav-btn:disabled { 
    opacity: 0.15; 
    cursor: default; 
  }
  .flip-btn {
    background: var(--accent);
    border: none;
    color: #0B0F1A;
    font-family: 'DM Sans', var(--font-ko);
    font-size: 14px;
    font-weight: 700;
    padding: 11px 36px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 15px rgba(124, 167, 235, 0.3);
  }
  .flip-btn:hover { 
    opacity: 0.95;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124, 167, 235, 0.4);
  }

  /* ── WORD LIST ── */
  .wordlist {
    width: 100%;
    max-width: 720px;
    margin-top: 3rem;
    padding: 0 1.5rem 4rem;
  }
  .wordlist-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  /* 모바일/데스크톱 대응 최대 높이 제한 및 목록 내부 스크롤화 */
  .wordlist-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 220px;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .wordlist-grid::-webkit-scrollbar {
    width: 4px;
  }
  .wordlist-grid::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
  }
  
  .word-chip {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .word-chip:hover { 
    border-color: rgba(124,167,235,0.4); 
    color: var(--accent); 
    background: rgba(124,167,235,0.05);
  }
  .word-chip.active { 
    background: var(--accent-dim); 
    border-color: var(--accent); 
    color: var(--accent); 
    font-weight: 600; 
    box-shadow: 0 0 12px rgba(124, 167, 235, 0.15);
  }

  @media (max-width: 480px) {
    :root { --card-w: calc(100vw - 2rem); --card-h: 510px; }
    header { padding: 1.5rem 1rem 1rem; }
    .brand { font-size: 12px; }
    .home-btn { padding: 4px 10px; font-size: 10px; }
    .nav { gap: 10px; width: 100%; padding: 0 1rem; }
    .nav-btn { flex: 1; padding: 11px 0; text-align: center; }
    .flip-btn { flex: 1.5; padding: 11px 0; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="home-btn">← 메인</a>
    <span class="brand">민쌤영어 · English Lab</span>
  </div>
  <span class="set-label">Vocabulary Set 02</span>
</header>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:2.9%"></div></div>
  <span class="progress-text" id="progressText">1 / 35</span>
</div>

<div class="stage" id="stage" tabindex="0" role="button" aria-label="카드 뒤집기">
  <div class="card" id="card">
    <div class="face front" id="frontFace">
      <div class="front-topbar">
        <span class="front-label">민쌤영어 · vocab</span>
        <span class="pos-pill" id="fPos">n.</span>
      </div>
      <div class="front-body">
        <p class="sentence" id="fSentence"></p>
      </div>
      <div class="front-footer">탭하거나 스페이스바로 뜻 확인 →</div>
      <div class="deco-bar"></div>
    </div>
    <div class="face back">
      <div class="back-header">
        <div class="back-word" id="bWord"></div>
        <div class="back-pos" id="bPos"></div>
      </div>
      <div class="back-body" id="bBody"></div>
      <div class="back-deco"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="btnPrev" onclick="go(-1)">← 이전</button>
  <button class="flip-btn" onclick="flip()">뒤집기</button>
  <button class="nav-btn" id="btnNext" onclick="go(1)">다음 →</button>
</div>

<div class="wordlist">
  <div class="wordlist-title">Set 02 단어 목록</div>
  <div class="wordlist-grid" id="wordGrid"></div>
</div>

<script>
const DATA = [
  {
    word: "rhetoric",
    pos: "n.",
    meanings: [
      { num:"①", text:"(설득·표현의 기술로서) 수사학, 웅변술" },
      { num:"②", text:"(내용 없이 화려한) 미사여구, 공허한 말 (empty rhetoric)" }
    ],
    sentence: "The candidate's speech was filled with {rhetoric} that stirred the crowd emotionally, yet offered little in the way of concrete policy proposals.",
    translation: "그 후보의 연설은 군중을 감정적으로 자극하는 미사여구로 가득 차 있었지만, 구체적인 정책 제안은 거의 없었다."
  },
  {
    word: "annoy",
    pos: "v.",
    meanings: [
      { num:"①", text:"(사람을) 짜증나게 하다, 신경 쓰이게 하다" },
      { num:"②", text:"성가시게 굴다, 귀찮게 하다 (be annoyed at/with ~에 짜증이 나다)" }
    ],
    sentence: "What {annoyed} the professor most was not the students' mistakes themselves but their apparent unwillingness to learn from them.",
    translation: "교수를 가장 짜증나게 한 것은 학생들의 실수 자체가 아니라, 그로부터 배우려 하지 않는 명백한 태도였다."
  },
  {
    word: "biased",
    pos: "a.",
    meanings: [
      { num:"①", text:"(특정 방향으로) 편향된, 치우친" },
      { num:"②", text:"편견을 가진, 불공정한 (biased toward/against ~에 유리/불리하게 편향된)" }
    ],
    sentence: "Critics argued that the documentary was heavily {biased} against the corporation, presenting only evidence that supported a predetermined conclusion.",
    translation: "비평가들은 그 다큐멘터리가 기업에 불리하게 편향되어 있으며, 미리 정해진 결론을 뒷받침하는 증거만을 제시했다고 주장했다."
  },
  {
    word: "contend",
    pos: "v.",
    meanings: [
      { num:"①", text:"(사실·의견으로) 주장하다, 역설하다" },
      { num:"②", text:"(경쟁·어려움과) 다투다, 겨루다" },
      { num:"③", text:"싸우다, 투쟁하다 (contend with 어려움에 맞서다)" }
    ],
    sentence: "Several economists {contend} that excessive government regulation, rather than market failure, is the primary obstacle to sustainable growth.",
    translation: "여러 경제학자들은 시장 실패보다 과도한 정부 규제가 지속 가능한 성장의 주된 장애물이라고 주장한다."
  },
  {
    word: "cultivate",
    pos: "v.",
    meanings: [
      { num:"①", text:"(땅을) 경작하다, 재배하다" },
      { num:"②", text:"(능력·관계·습관을) 계발하다, 키우다" },
      { num:"③", text:"(사람과의 관계를) 발전시키다, 육성하다" }
    ],
    sentence: "The ability to think critically is not innate; it must be actively {cultivated} through rigorous practice and exposure to diverse perspectives.",
    translation: "비판적으로 사고하는 능력은 타고나는 것이 아니라, 엄격한 훈련과 다양한 관점에의 노출을 통해 적극적으로 계발되어야 한다."
  },
  {
    word: "demanding",
    pos: "a.",
    meanings: [
      { num:"①", text:"(일·상황이) 힘든, 부담이 큰" },
      { num:"②", text:"(사람이) 요구가 많은, 까다로운" }
    ],
    sentence: "The position requires candidates who thrive under pressure, as the role is both intellectually and physically {demanding}.",
    translation: "그 직책은 지적으로나 신체적으로 모두 부담이 큰 역할이기 때문에, 압박 속에서도 잘 해내는 지원자를 필요로 한다."
  },
  {
    word: "imperial",
    pos: "a.",
    meanings: [
      { num:"①", text:"제국의, 제국에 관한" },
      { num:"②", text:"황제의, 황실의" },
      { num:"③", text:"(도량형) 영국 표준의 (imperial unit)" }
    ],
    sentence: "The {imperial} ambitions of the regime led it to pursue aggressive territorial expansion at the cost of diplomatic isolation.",
    translation: "그 정권의 제국주의적 야망은 외교적 고립을 감수하면서까지 공격적인 영토 확장을 추구하게 만들었다."
  },
  {
    word: "innocent",
    pos: "a.",
    meanings: [
      { num:"①", text:"(법적으로) 무죄의, 결백한 ↔ guilty" },
      { num:"②", text:"(순수하고) 순진한, 천진한 / 악의 없는, 해가 없는" },
      { num:"③", text:"(~을) 모르는, 경험 없는" }
    ],
    sentence: "The defendant was ultimately found {innocent} of all charges after new forensic evidence cast serious doubt on the prosecution's case.",
    translation: "새로운 법의학 증거가 검찰 측 주장에 심각한 의문을 제기한 후, 피고인은 결국 모든 혐의에 대해 무죄 판결을 받았다."
  },
  {
    word: "integration",
    pos: "n.",
    meanings: [
      { num:"①", text:"(여러 요소의) 통합, 융합" },
      { num:"②", text:"(인종·계층 간) 통합, 차별 철폐" },

    sentence: "The novel's intricate {plot}, which weaves together multiple timelines and unreliable narrators, demands close attention from the reader throughout.",
    translation: "여러 시간대와 신뢰할 수 없는 화자들을 엮어낸 소설의 복잡한 줄거리는 독자들이 처음부터 끝까지 집중할 것을 요구한다."
  },
  {
    word: "prosperity",
    pos: "n.",
    meanings: [
      { num:"①", text:"(경제적) 번영, 번창" },
      { num:"②", text:"(개인·사회의) 풍요, 성공 (bring prosperity to ~에 번영을 가져다주다)" }
    ],
    sentence: "Economic {prosperity} built on the exploitation of natural resources tends to be short-lived unless accompanied by sustainable long-term planning.",
    translation: "천연자원 착취를 기반으로 한 경제적 번영은 지속 가능한 장기 계획이 수반되지 않으면 오래 지속되지 않는 경향이 있다."
  },
  {
    word: "smooth",
    pos: "a. / v.",
    meanings: [
      { num:"①", text:"(표면이) 매끄러운 ↔ rough / (진행이) 원활한, 순조로운" },
      { num:"②", text:"(맛이) 부드러운 / (사람·말이) 능숙한, 세련된" },
      { num:"③", text:"(v.) 매끄럽게 하다 / (어려움을) 해소하다 (smooth things over)" }
    ],
    sentence: "Effective communication between departments is essential to ensuring the {smooth} implementation of any large-scale organizational change.",
    translation: "부서 간의 효과적인 소통은 대규모 조직 변화의 원활한 실행을 보장하는 데 필수적이다."
  }
];

let current = 0;

function renderSentence(template) {
  return template.replace(/\{([^}]+)\}/g, '<span class="hw">$1</span>');
}

function renderCard(idx) {
  const d = DATA[idx];
  document.getElementById('fPos').textContent = d.pos;
  document.getElementById('fSentence').innerHTML = renderSentence(d.sentence);
  document.getElementById('bWord').textContent = d.word;
  document.getElementById('bPos').textContent = d.pos;

  const exEng = d.sentence.replace(/\{([^}]+)\}/g, '<strong>$1</strong>');
  const exHtml = `<div class="ex-block"><p class="ex-eng">${exEng}</p><p class="ex-kor">${d.translation}</p></div>`;

  let bodyHtml = '';
  d.meanings.forEach(m => {
    bodyHtml += `<div class="meaning-block"><span class="meaning-num">${m.num} 의미</span><span class="meaning-text">${m.text}</span></div>`;
  });
  bodyHtml += '<div class="rule"></div>' + exHtml;
  
  const bBody = document.getElementById('bBody');
  bBody.innerHTML = bodyHtml;
  
  // 새로운 단어로 넘어갈 때 뒷면 내부 스크롤 위치를 맨 위로 초기화
  bBody.scrollTop = 0;

  const pct = ((idx + 1) / DATA.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${DATA.length}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === DATA.length - 1;

  document.querySelectorAll('.word-chip').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // 현재 활성화된 단어 칩 위치를 자동 감지해 칩 목록 뷰를 부드럽게 스크롤링
  const activeChip = document.querySelector('.word-chip.active');
  if (activeChip) {
    activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }

  document.getElementById('card').classList.remove('flipped');
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= DATA.length) return;
  current = next;
  renderCard(current);
}

// Build word chips
const grid = document.getElementById('wordGrid');
DATA.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'word-chip' + (i === 0 ? ' active' : '');
  btn.textContent = d.word;
  btn.onclick = () => { current = i; renderCard(i); };
  grid.appendChild(btn);
});

// Keyboard Controls
document.getElementById('stage').addEventListener('click', flip);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

renderCard(0);
</script>
</body>
</html>
