<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민쌤영어 · Set 10 어휘 테스트</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9590090798290569" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ━━━ CSS 변수 시스템 ━━━ */
:root {
  --bg: #0B0F1A;
  --surface:  #131929;
  --surface2: #1a2236;
  --surface3: #0e1322;
  --accent: #7CA7EB;
  --accent-dim: rgba(124,167,235,0.12);
  --accent-border: rgba(124,167,235,0.25);
  --gold: #E8C97A;
  --gold-dim: rgba(232,201,122,0.12);
  --gold-border: rgba(232,201,122,0.30);
  --correct: #4ade80;
  --correct-dim: rgba(74,222,128,0.08);
  --correct-border: rgba(74,222,128,0.28);
  --correct-glow: rgba(74,222,128,0.18);
  --wrong: #f87171;
  --wrong-dim: rgba(248,113,113,0.08);
  --wrong-border: rgba(248,113,113,0.28);
  --wrong-glow: rgba(248,113,113,0.18);
  --text: #F0EEE8;
  --text-muted: rgba(240,238,232,0.52);
  --text-dim: rgba(240,238,232,0.18);
  --radius: 16px;
  --radius-sm: 10px;
  --font-base: 'Pretendard', 'DM Sans', -apple-system, sans-serif;
  --font-brand: 'DM Sans', 'Pretendard', sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
}

/* ━━━ 글로벌 기반 ━━━ */
body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 20% -10%, rgba(124,167,235,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 30% at 85% 15%, rgba(232,201,122,0.06) 0%, transparent 55%);
  color: var(--text);
  font-family: var(--font-base);
  min-height: 100vh;
  padding: 0 0 6rem;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

.page { max-width: 740px; margin: 0 auto; padding: 0 1.4rem; }

/* ━━━ 헤더 ━━━ */
.site-header {
  width: 100%;
  background: rgba(13,18,32,0.85);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,255,255,0.055);
  padding: 1.1rem 1.8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 2.2rem;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-left { display: flex; align-items: center; gap: 14px; }

.home-btn {
  font-family: var(--font-base);
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 99px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.2s ease;
  white-space: nowrap;
}
.home-btn:hover {
  color: var(--accent);
  background: var(--accent-dim);
  border-color: var(--accent-border);
}

.brand-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-brand);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #fff;
  background: linear-gradient(135deg, var(--surface2) 0%, #1e2d47 100%);
  border: 1px solid var(--accent-border);
  padding: 5px 14px;
  border-radius: 99px;
  box-shadow: 0 2px 10px rgba(124,167,235,0.12), inset 0 1px 0 rgba(255,255,255,0.07);
}
.brand-tag .dot { color: var(--accent); }

.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.page-title {
  font-family: var(--font-serif);
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.2;
}
.page-title span { color: var(--accent); }
.page-sub { font-size: 11px; color: var(--text-muted); }

/* ━━━ 스탯 바 ━━━ */
.stats-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 2.2rem;
  flex-wrap: wrap;
}
.stat-pill {
  flex: 1;
  min-width: 120px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: default;
}
.stat-pill::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.stat-pill:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,167,235,0.12);
}
.stat-pill:hover::before { opacity: 1; }
.stat-pill-num {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gold);
  display: block;
  line-height: 1.2;
}
.stat-pill-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  margin-top: 2px;
  display: block;
}
.stat-pill-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

/* ━━━ 섹션 헤더 ━━━ */
.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 2.4rem 0 0.6rem;
}
.section-icon {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  box-shadow: 0 0 12px rgba(124,167,235,0.15);
}
.section-icon.gold-icon {
  background: var(--gold-dim);
  border-color: var(--gold-border);
  box-shadow: 0 0 12px rgba(232,201,122,0.15);
}
.section-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--accent) 0%, #5B86E5 100%);
  color: #0B0F1A;
  padding: 4px 14px;
  border-radius: 99px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(124,167,235,0.25);
}
.section-tag.gold {
  background: linear-gradient(135deg, var(--gold) 0%, #d4a843 100%);
  box-shadow: 0 2px 8px rgba(232,201,122,0.25);
}
.section-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(124,167,235,0.2), transparent);
}
.section-line.gold-line {
  background: linear-gradient(90deg, rgba(232,201,122,0.2), transparent);
}
.section-desc {
  font-size: 12.5px;
  color: var(--text-muted);
  margin-bottom: 1.4rem;
  line-height: 1.6;
  font-family: var(--font-base);
}

/* ━━━ 파트 헤더 ━━━ */
.part-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 1.8rem 0 1rem;
}
.part-tag {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--accent-border);
  color: var(--accent);
  padding: 3px 12px;
  border-radius: 99px;
  background: var(--accent-dim);
}
.part-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06), transparent);
}
.part-score {
  font-size: 11.5px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.04em;
}

/* ━━━ 워드 뱅크 ━━━ */
.word-bank {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 1rem 1.3rem;
  margin-bottom: 1.3rem;
  position: relative;
  overflow: hidden;
}
.word-bank::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,167,235,0.15), transparent);
}
.wb-label-row {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 0.75rem;
}
.wb-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.wb-item {
  font-size: 13px;
  color: var(--text);
  padding: 4px 13px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 99px;
  background: transparent;
  transition: all 0.15s;
  font-family: var(--font-brand);
}
.wb-item.used {
  color: var(--text-dim);
  border-color: rgba(255,255,255,0.04);
  text-decoration: line-through;
  opacity: 0.5;
}
.wb-key { font-weight: 700; color: var(--accent); margin-right: 4px; }

/* ━━━ 유형 A 문항 카드 ━━━ */
.qa-block { margin-bottom: 1.5rem; }
.qa-num {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 0.45rem;
  letter-spacing: 0.05em;
}
.qa-sent {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 1.1rem 1.4rem;
  font-size: 15px;
  line-height: 1.85;
  color: rgba(240,238,232,0.92);
  font-family: var(--font-brand);
  box-shadow: 0 2px 12px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: border-color 0.2s;
}
.qa-sent:focus-within { border-color: rgba(124,167,235,0.22); }
.qa-sent .blank-wrap { display: inline-block; position: relative; margin: 0 4px; }

/* ━━━ 빈칸 버튼 & 드롭다운 ━━━ */
.blank-btn {
  display: inline-block;
  min-width: 115px;
  padding: 3px 12px;
  border: 1.5px dashed rgba(124,167,235,0.35);
  border-radius: 8px;
  background: rgba(124,167,235,0.07);
  color: var(--text-muted);
  font-family: var(--font-brand);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.18s ease;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
  vertical-align: middle;
}
.blank-btn:hover {
  border-color: var(--accent);
  border-style: solid;
  color: var(--accent);
  background: var(--accent-dim);
  box-shadow: 0 4px 14px rgba(124,167,235,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
  transform: translateY(-1px);
}
.blank-btn.selected {
  border-style: solid;
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
  background: var(--accent-dim);
  box-shadow: 0 4px 14px rgba(124,167,235,0.15);
}
.blank-btn.correct-ans {
  border-style: solid;
  border-color: var(--correct);
  color: var(--correct);
  background: var(--correct-dim);
  box-shadow: 0 0 14px rgba(74,222,128,0.22);
}
.blank-btn.wrong-ans {
  border-style: solid;
  border-color: var(--wrong);
  color: var(--wrong);
  background: var(--wrong-dim);
  box-shadow: 0 0 14px rgba(248,113,113,0.22);
}

/* 드롭다운 메뉴 공중 부유 효과 */
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  z-index: 100;
  background: rgba(18,26,46,0.96);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--accent-border);
  border-radius: 12px;
  overflow: hidden;
  min-width: 150px;
  box-shadow:
    0 12px 32px rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.3),
    0 0 0 1px rgba(124,167,235,0.08),
    inset 0 1px 0 rgba(255,255,255,0.07);
}
.dropdown-menu.open { display: block; animation: ddFadeIn 0.15s ease; }
@keyframes ddFadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.dropdown-item {
  display: block;
  width: 100%;
  padding: 9px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  background: transparent;
  border: none;
  text-align: left;
  font-family: var(--font-brand);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.dropdown-item:hover { background: var(--accent-dim); color: var(--accent); }
.dropdown-item.selected { color: var(--accent); font-weight: 600; }

/* ━━━ 유형 B 문항 카드 ━━━ */
.qb-block { margin-bottom: 1.8rem; }
.qb-sent {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 1.1rem 1.4rem;
  font-size: 15px;
  line-height: 1.85;
  border-bottom: none;
  font-family: var(--font-brand);
  color: rgba(240,238,232,0.92);
  box-shadow: 0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
}
.qb-sent .kw {
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--gold);
  font-weight: 600;
  color: #f5e09a;
}
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
}
.choice-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0.85rem 1.1rem;
  font-size: 13.5px;
  cursor: pointer;
  border: none;
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font-base);
  text-align: left;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
  border-top: 1px solid rgba(255,255,255,0.04);
  line-height: 1.4;
}
.choice-btn:nth-child(odd) { border-right: 1px solid rgba(255,255,255,0.04); }
.choice-btn:hover:not(:disabled) {
  background: var(--accent-dim);
  color: rgba(240,238,232,0.95);
}
.choice-btn:disabled { cursor: default; }

/* 정답/오답 네온 글로우 */
.choice-btn.correct {
  background: var(--correct-dim);
  color: var(--correct);
  box-shadow: inset 0 0 0 1px var(--correct-border), 0 0 16px var(--correct-glow);
}
.choice-btn.wrong {
  background: var(--wrong-dim);
  color: var(--wrong);
  box-shadow: inset 0 0 0 1px var(--wrong-border), 0 0 16px var(--wrong-glow);
}
.choice-num {
  font-weight: 700;
  color: var(--accent);
  font-size: 12.5px;
  min-width: 18px;
  flex-shrink: 0;
}
.choice-btn.correct .choice-num { color: var(--correct); }
.choice-btn.wrong .choice-num { color: var(--wrong); }

/* ━━━ 결과 패널 ━━━ */
.result-panel {
  display: none;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 1.6rem;
  margin-top: 2rem;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
}
.result-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--accent), transparent);
}
.result-panel.show { display: block; animation: panelIn 0.3s ease; }
@keyframes panelIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-title {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 1.2rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-title::before {
  content: '■';
  font-size: 6px;
  opacity: 0.6;
}

/* 스코어 대시보드 */
.result-score-row {
  display: flex;
  gap: 10px;
  margin-bottom: 1.4rem;
  flex-wrap: wrap;
}
.rscore {
  flex: 1;
  min-width: 90px;
  text-align: center;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 1rem 0.8rem;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
}
.rscore-num {
  font-family: var(--font-serif);
  font-size: 1.75rem;
  font-weight: 700;
  display: block;
  line-height: 1.1;
  margin-bottom: 4px;
}
.rscore-num.good { color: var(--correct); text-shadow: 0 0 20px rgba(74,222,128,0.35); }
.rscore-num.bad  { color: var(--wrong);   text-shadow: 0 0 20px rgba(248,113,113,0.35); }
.rscore-num.neutral { color: var(--accent); text-shadow: 0 0 20px rgba(124,167,235,0.3); }
.rscore-label {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

/* 정답 목록 */
.ans-list { display: flex; flex-direction: column; gap: 7px; }
.ans-row {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: 10px;
  align-items: start;
  padding: 10px 13px;
  border-radius: 10px;
  font-size: 13px;
  transition: opacity 0.15s;
}
.ans-row.ok {
  background: var(--correct-dim);
  border: 1px solid var(--correct-border);
  box-shadow: 0 0 10px rgba(74,222,128,0.06);
}
.ans-row.ng {
  background: var(--wrong-dim);
  border: 1px solid var(--wrong-border);
  box-shadow: 0 0 10px rgba(248,113,113,0.06);
}
.ans-icon {
  font-size: 14px;
  line-height: 1.6;
  text-align: center;
}
.ans-content .word {
  font-weight: 700;
  color: var(--text);
  font-family: var(--font-brand);
}
.ans-content .meaning { color: var(--text-muted); font-size: 12px; }
.ans-content .trans {
  color: rgba(240,238,232,0.9);
  font-size: 12px;
  font-weight: 500;
  margin-top: 5px;
  line-height: 1.65;
  font-family: var(--font-base);
}
.ans-content .user-ans { font-size: 12px; margin-top: 3px; font-family: var(--font-base); }
.ans-content .user-ans.wrong-text { color: var(--wrong); }

/* ━━━ 버튼 ━━━ */
.btn-row { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
.btn {
  padding: 11px 24px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-base);
  letter-spacing: 0.03em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  border: none;
}
.btn:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #5B86E5 100%);
  color: #0B0F1A;
  box-shadow: 0 4px 14px rgba(124,167,235,0.28);
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, #c99c3a 100%);
  color: #0B0F1A;
  box-shadow: 0 4px 14px rgba(232,201,122,0.28);
}
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.12);
}
.btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); }

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  margin: 3rem 0;
}

@media (max-width: 500px) {
  .site-header { padding: 0.9rem 1rem; gap: 10px; }
  .header-right { display: none; }

  {word:"inquiry",      sent:"The parliamentary {inquiry} into the handling of the public health emergency was expected to examine both official decisions and the adequacy of the support systems.", trans:"공중 보건 비상사태 처리에 대한 의회 조사는 공직자들이 내린 결정과 그 결정들을 지원하기 위한 시스템의 적절성도 검토할 것으로 예상되었다.", choices:["조사·탐구","발표","합의","지원"], correct:0},

  {word:"machinery",    sent:"The {machinery} of international law has repeatedly demonstrated its inability to compel compliance from states that calculate non-compliance to be more beneficial.", trans:"국제법의 체계는 불이행의 이익이 비용을 능가한다고 계산하는 국가들의 준수를 강요하는 무능력을 반복적으로 보여주었다.", choices:["기계류","체계·구조","역사","규범"], correct:1},

  {word:"probability",  sent:"The {probability} of a significant seismic event occurring in this region within the next fifty years is estimated at over sixty percent.", trans:"향후 50년 내에 이 지역에서 중요한 지진 사건이 발생할 확률은 60퍼센트 이상으로 추정된다.", choices:["확률·가능성","빈도","원인","결과"], correct:0},
  {word:"proposition",  sent:"The {proposition} that individuals are fundamentally rational actors has been challenged by decades of behavioral economics research demonstrating systematic deviations.", trans:"개인들이 근본적으로 합리적인 행위자라는 명제는 이 모델로부터의 체계적인 이탈을 입증하는 수십 년간의 행동 경제학 연구에 의해 도전받아왔다.", choices:["명제·제안","결론","실험","이론"], correct:0},
  {word:"renewable",    sent:"The transition to {renewable} energy sources is no longer merely an environmental imperative; it has become an economic necessity.", trans:"재생 에너지원으로의 전환은 더 이상 단순히 환경적 명령이 아니다. 그것은 경제적 필요성이 되었다.", choices:["화석","재생 가능한·갱신할 수 있는","핵","기존의"], correct:1},
  {word:"steer",        sent:"The moderator skillfully {steered} the conversation away from personal accusations, redirecting the panel's attention toward substantive policy questions.", trans:"진행자는 가장 논쟁적인 개인적 비난으로부터 대화를 유도하여, 패널의 주의를 실질적인 정책 문제들로 돌렸다.", choices:["유도했다·이끌었다","차단했다","무시했다","가속시켰다"], correct:0},
  {word:"acclaim",      sent:"The novel received widespread critical {acclaim} upon its publication, with reviewers praising its structural originality and psychological precision.", trans:"그 소설은 출판 시 평단의 광범위한 찬사를 받았으며, 평론가들은 구조적 독창성과 심리적 정밀함을 칭찬했다.", choices:["비판","찬사·갈채","무관심","논란"], correct:1},
  {word:"assault",      sent:"The frontline units launched a coordinated {assault} on the fortified position at dawn, supported by artillery fire and aerial reconnaissance.", trans:"전선 부대들은 포병 사격과 공중 정찰의 지원을 받아 새벽에 요새화된 진지에 대한 조율된 공격을 개시했다.", choices:["공격·폭행","후퇴","협상","방어"], correct:0},
  {word:"assignment",   sent:"The foreign correspondent was on {assignment} in three different countries over a single month, filing reports on rapidly developing situations.", trans:"그 해외 특파원은 한 달 동안 세 개의 다른 나라에서 임무를 수행하며, 빠르게 전개되는 상황들에 대한 보도를 송고했다.", choices:["임무·과제","휴가","훈련","보상"], correct:0},
  {word:"be characterized by",sent:"The early phase of the industrial revolution {was characterized by} a rapid concentration of labor in urban centers and dramatic improvements in productive efficiency.", trans:"산업 혁명의 초기 단계는 도시 중심지에서의 급격한 노동력 집중과 생산 효율성의 극적인 향상으로 특징지어졌다.", choices:["~에 의해 야기되었다","~의 특징을 가졌다","~에 의해 극복되었다","~을 초래하였다"], correct:1},
  {word:"bite",         sent:"The economic sanctions imposed at the start of the year began to {bite} by the third quarter, as foreign exchange reserves dwindled.", trans:"연초에 부과된 경제 제재는 3분기에 효과가 나타나기 시작하여, 외환 보유고가 줄어들었다.", choices:["사라지다","효과가 나타나기 시작하다","완화되다","강화되다"], correct:1},
  {word:"breakdown",    sent:"The {breakdown} of the peace talks was attributed to both sides' unwillingness to make the concessions that a sustainable agreement would have required.", trans:"평화 회담의 붕괴는 양측이 지속 가능한 합의가 필요로 했을 양보를 하려는 의지가 없었던 것으로 귀인되었다.", choices:["붕괴·실패","성공","재개","합의"], correct:0},
  {word:"caste",        sent:"Despite constitutional provisions prohibiting {caste}-based discrimination, deeply ingrained social hierarchies continue to shape access to education and employment.", trans:"카스트에 기반한 차별을 금지하는 헌법 조항에도 불구하고, 깊이 뿌리박힌 사회적 위계는 교육과 고용에 대한 접근을 계속 형성하고 있다.", choices:["카스트 계급·신분 제도","법률","전통","문화"], correct:0},
  {word:"stow",         sent:"Passengers are reminded to {stow} all carry-on luggage in the overhead compartments before the aircraft doors are closed.", trans:"승객들은 항공기 문이 닫히기 전에 모든 기내 수하물을 머리 위 수납칸에 집어넣을 것을 안내받는다.", choices:["집어넣다·보관하다","꺼내다","확인하다","버리다"], correct:0},
  {word:"chemist",      sent:"The {chemist} who developed the compound spent over a decade refining its molecular structure before it demonstrated the stability and efficacy required for clinical application.", trans:"그 화합물을 개발한 화학자는 그것이 임상 적용에 필요한 안정성과 효능을 입증하기 전에 10년 이상 분자 구조를 다듬는 데 보냈다.", choices:["화학자","물리학자","생물학자","의사"], correct:0},
  {word:"crew",         sent:"The {crew} of the research vessel worked in rotating shifts throughout the expedition, maintaining continuous monitoring of the ocean floor.", trans:"연구 선박의 승무원들은 탐사 내내 교대 근무를 하며 해저의 지속적인 모니터링을 유지했다.", choices:["승무원·팀","장비","연료","화물"], correct:0},
];

// ── STATE ──
const stateA = {}; // qIdx -> selectedWord
const stateB = {}; // qIdx -> selectedIdx
let aChecked = false, bChecked = false;

// ── SHUFFLED PART WORDS (랜덤, 페이지 로드 시 1회 고정) ──
const SHUFFLED_PART_WORDS = {};
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
[1,2,3,4].forEach(p => { SHUFFLED_PART_WORDS[p] = shuffle(PART_WORDS[p]); });
const LABELS = ['A','B','C','D','E'];

// ── BUILD TYPE A ──
function buildTypeA() {
  [1,2,3,4].forEach(part => {
    // 워드뱅크 동적 생성 (셔플 순서)
    const wb = document.getElementById(`wb${part}`);
    const used = Object.entries(stateA)
      .filter(([k]) => TYPE_A[parseInt(k)].part === part)
      .map(([,v]) => v);
    wb.innerHTML = `<div class="wb-label-row">보기</div>
      <div class="wb-grid">
        ${SHUFFLED_PART_WORDS[part].map((w,li) =>
          `<span class="wb-item${used.includes(w)?' used':''}" id="wb${part}-${w}">
            <span class="wb-key">${LABELS[li]}.</span>${w}
          </span>`).join('')}
      </div>`;

    // 문제 생성
    const container = document.getElementById(`part${part}-qs`);
    container.innerHTML = '';
    const qs = TYPE_A.filter(q => q.part === part);
    qs.forEach(q => {
      const idx = TYPE_A.indexOf(q);
      const num = idx + 1;
      const parts = q.sent.split('___');
      const div = document.createElement('div');
      div.className = 'qa-block';
      div.innerHTML = `<div class="qa-num">${num}.</div>
        <div class="qa-sent">
          ${parts[0]}<span class="blank-wrap">
            <button class="blank-btn" id="blank-${idx}" onclick="toggleDropdown(${idx}, ${part}, event)">
              ${stateA[idx] || '▼ 선택'}
            </button>
            <div class="dropdown-menu" id="dd-${idx}">
              ${SHUFFLED_PART_WORDS[part].map((w,li) =>
                `<button class="dropdown-item ${stateA[idx]===w?'selected':''}"
                  onclick="selectWord(${idx},${part},'${w}',event)">${LABELS[li]}. ${w}</button>`
              ).join('')}
            </div>
          </span>${parts[1]}
        </div>`;
      container.appendChild(div);
    });
  });
  updateStatsBar();
}

function toggleDropdown(idx, part, e) {
  e.stopPropagation();
  if (aChecked) return;
  document.querySelectorAll('.dropdown-menu').forEach(m => { if (m.id !== `dd-${idx}`) m.classList.remove('open'); });
  document.getElementById(`dd-${idx}`).classList.toggle('open');
}

function selectWord(idx, part, word, e) {
  e.stopPropagation();
  stateA[idx] = word;
  document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
  updateWbUsed(part);
}

document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
});

function updateWbUsed(part) {
  const answered = Object.keys(stateA).filter(k => TYPE_A[parseInt(k)].part === part).length;
  document.getElementById(`p${part}score`).textContent = `${answered}/5`;
  buildTypeA();
}

// ── CHECK TYPE A ──
function checkA() {
  let correct = 0;
  aChecked = true;
  TYPE_A.forEach((q, idx) => {
    const btn = document.getElementById(`blank-${idx}`);
    if (!btn) return;
    const selected = stateA[idx];
    if (!selected) {
      btn.classList.add('wrong-ans');
      btn.textContent = `✗ (${q.word})`;
    } else if (selected === q.word) {
      btn.classList.add('correct-ans');
      correct++;
    } else {
      btn.classList.add('wrong-ans');
      btn.textContent = `${selected} ✗`;
    }
    document.querySelectorAll(`#dd-${idx} .dropdown-item`).forEach(item => item.disabled = true);
  });
  document.querySelectorAll('.blank-btn').forEach(b => b.style.pointerEvents='none');

  // result panel
  const panel = document.getElementById('resultA');
  panel.classList.add('show');
  panel.innerHTML = `
    <div class="result-title">유형 A 채점 결과</div>
    <div class="result-score-row">
      <div class="rscore"><span class="rscore-num ${correct>=15?'good':correct>=10?'neutral':'bad'}">${correct}/20</span><span class="rscore-label">정답</span></div>
      <div class="rscore"><span class="rscore-num bad">${20-correct}/20</span><span class="rscore-label">오답</span></div>
      <div class="rscore"><span class="rscore-num neutral">${Math.round(correct/20*100)}%</span><span class="rscore-label">정답률</span></div>
    </div>
    <div class="ans-list">${TYPE_A.map((q,i)=>{
      const sel = stateA[i];
      const ok = sel === q.word;
      return `<div class="ans-row ${ok?'ok':'ng'}">
        <span class="ans-icon">${ok?'✓':'✗'}</span>
        <div class="ans-content">
          <span class="word">${q.word}</span> <span class="meaning" style="color:var(--text-muted);font-size:12px">— ${q.meaning}</span>
          ${!ok?`<div class="user-ans wrong-text">내 답: ${sel||'(미입력)'} → 정답: ${q.word}</div>`:''}
          <div class="trans">${q.trans}</div>
        </div>
      </div>`;
    }).join('')}</div>`;

  updateStatsBar();
}

function resetA() {
  aChecked = false;
  Object.keys(stateA).forEach(k => delete stateA[k]);
  buildTypeA();
  [1,2,3,4].forEach(p => {
    PART_WORDS[p].forEach(w => {
      const el = document.getElementById(`wb${p}-${w}`);
      if (el) el.classList.remove('used');
    });
    document.getElementById(`p${p}score`).textContent = '0/5';
  });
  document.getElementById('resultA').classList.remove('show');
  document.getElementById('resultA').innerHTML = '';
}

// ── BUILD TYPE B ──
function buildTypeB() {
  const container = document.getElementById('partB-qs');
  container.innerHTML = '';
  SHUFFLED_TYPE_B.forEach((q, idx) => {
    const num = 21 + idx;
    // {word} 또는 {word의 변형형} 처리: 중괄호 안 텍스트를 밑줄 span으로 교체
    const sent = q.sent.replace(/\{([^}]+)\}/g, '<span class="kw">$1</span>');
    const div = document.createElement('div');
    div.className = 'qb-block';
    const answered = stateB[idx] !== undefined;
    div.innerHTML = `
      <div class="qa-num">${num}.</div>
      <div class="qb-sent">${sent}</div>
      <div class="choices" id="choicesB-${idx}">
        ${q.choices.map((c,ci)=>`
          <button class="choice-btn ${answered?(ci===stateB[idx]?(ci===q.correct?'correct':'wrong'):(ci===q.correct&&stateB[idx]!==undefined?'correct':'')):''}
          " onclick="answerB(${idx},${ci})" ${answered?'disabled':''}>
            <span class="choice-num">①②③④"[ci]"</span>${c}
          </button>`
          .replace('"[ci]"', ['','','',''][ci])
          .replace('①②③④', ['①','②','③','④'][ci])
        ).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateStatsBar();
}

function answerB(idx, chosen) {
  if (stateB[idx] !== undefined) return;
  stateB[idx] = chosen;
  const container = document.getElementById(`choicesB-${idx}`);
  container.querySelectorAll('.choice-btn').forEach((btn, ci) => {
    btn.disabled = true;
    if (ci === chosen && ci === SHUFFLED_TYPE_B[idx].correct) btn.classList.add('correct');
    else if (ci === chosen) btn.classList.add('wrong');
    else if (ci === SHUFFLED_TYPE_B[idx].correct) btn.classList.add('correct');
  });
  updateStatsBar();
}

// ── CHECK TYPE B ──
function checkB() {
  let correct = 0;
  SHUFFLED_TYPE_B.forEach((q, idx) => {
    const container = document.getElementById(`choicesB-${idx}`);
    if (!container) return;
    container.querySelectorAll('.choice-btn').forEach((btn, ci) => {
      btn.disabled = true;
      if (ci === q.correct) btn.classList.add('correct');
      else if (ci === stateB[idx] && ci !== q.correct) btn.classList.add('wrong');
    });
    if (stateB[idx] === q.correct) correct++;
  });
  bChecked = true;

  const panel = document.getElementById('resultB');
  panel.classList.add('show');
  panel.innerHTML = `
    <div class="result-title">유형 B 채점 결과</div>
    <div class="result-score-row">
      <div class="rscore"><span class="rscore-num ${correct>=55?'good':correct>=41?'neutral':'bad'}">${correct}/30</span><span class="rscore-label">정답</span></div>
      <div class="rscore"><span class="rscore-num bad">${30-correct}/30</span><span class="rscore-label">오답</span></div>
      <div class="rscore"><span class="rscore-num neutral">${Math.round(correct/69*100)}%</span><span class="rscore-label">정답률</span></div>
    </div>
    <div class="ans-list">${SHUFFLED_TYPE_B.map((q,i)=>{
      const sel = stateB[i];
      const ok = sel === q.correct;
      return `<div class="ans-row ${ok?'ok':'ng'}">
        <span class="ans-icon">${ok?'✓':'✗'}</span>
        <div class="ans-content">
          <span class="word">${q.word}</span> <span class="meaning" style="color:var(--accent);font-size:12px">→ ${q.choices[q.correct]}</span>
          ${!ok?`<div class="user-ans wrong-text">내 답: ${sel!==undefined?q.choices[sel]:'(미선택)'}</div>`:''}
          <div class="trans">${q.trans}</div>
        </div>
      </div>`;
    }).join('')}</div>`;

  updateStatsBar();
}

function resetB() {
  bChecked = false;
  Object.keys(stateB).forEach(k => delete stateB[k]);
  buildTypeB();
  document.getElementById('resultB').classList.remove('show');
  document.getElementById('resultB').innerHTML = '';
}

// ── STATS BAR ──
function updateStatsBar() {
  const aAnswered = Object.keys(stateA).length;
  const bAnswered = Object.keys(stateB).length;
  document.getElementById('statA').textContent = `${aAnswered}/20`;
  document.getElementById('statB').textContent = `${bAnswered}/69`;
  document.getElementById('statTotal').textContent = `${aAnswered+bAnswered}/89`;
}


// ── SHUFFLE TYPE_B CHOICES (페이지 로드 시 1회 고정) ──
const SHUFFLED_TYPE_B = TYPE_B.map(q => {
  const indices = [0, 1, 2, 3];
  // Fisher-Yates 셔플
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  const shuffledChoices = indices.map(i => q.choices[i]);
  const newCorrect = indices.indexOf(q.correct);
  return { ...q, choices: shuffledChoices, correct: newCorrect };
});

// ── INIT ──
buildTypeA();
buildTypeB();
</script>
