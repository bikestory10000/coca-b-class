<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민쌤영어 Vocab · Set 06</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0F1A;
    --surface: #131929;
    --surface-hover: #192136;
    --accent: #7CA7EB;
    --accent-glow: rgba(124, 167, 235, 0.25);
    --accent-dim: rgba(124,167,235,0.14);
    --accent-border: rgba(124,167,235,0.28);
    --text: #F0EEE8;
    --text-muted: rgba(240,238,232,0.55);
    --text-dim: rgba(240,238,232,0.25);
    
    /* 카드 뒷면 프리미엄 라이트 테마 변수 */
    --back-bg: #F7F5F0;
    --back-text: #111111;
    --back-muted: #555555;
    --back-rule: rgba(0,0,0,0.06);
    --back-ex-bg: rgba(11,15,26,0.04);
    
    --radius: 22px;
    --card-w: 400px;
    --card-h: 540px;
    
    /* 폰트 스택 최적화 */
    --font-ko: 'Pretendard', 'Malgun Gothic', sans-serif;
  }

  body {
    background: var(--bg);
    background: radial-gradient(circle at top center, #161f36 0%, var(--bg) 70%);
    color: var(--text);
    font-family: 'DM Sans', var(--font-ko);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 900px;
    padding: 2.5rem 2rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 2rem;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .home-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    text-decoration: none;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
  }
  .home-btn:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .brand { 
    font-size: 14px; 
    letter-spacing: 0.14em; 
    color: var(--accent); 
    font-weight: 600; 
    text-transform: uppercase; 
  }
  .set-label { 
    font-size: 13px; 
    color: var(--text-muted); 
    font-weight: 500;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.8rem;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a0c4ff);
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-text {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* ── CARD STAGE ── */
  .stage {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 2000px;
    cursor: pointer;
    outline: none;
    margin-bottom: 0.5rem;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 5px 15px rgba(0, 0, 0, 0.2);
    border-radius: var(--radius);
  }
  
  /* 마우스 오버 및 활성화 상태 입체감 증폭 */
  .stage:hover .card {
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px var(--accent-glow);
  }
  .stage:focus-visible .card { 
    box-shadow: 0 0 0 3px var(--accent); 
  }

  /* 카드 플립 애니메이션 조정 (그림자 반전 포함) */
  .card.flipped { 
    transform: rotateY(180deg); 
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── FRONT ── */
  .front {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .front-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px 0;
  }
  .front-label { 
    font-size: 11px; 
    letter-spacing: 0.14em; 
    text-transform: uppercase; 
    color: var(--text-dim); 
    font-weight: 600; 
  }
  .pos-pill {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .front-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px 34px;
  }
  .sentence {
    font-size: 19px;
    line-height: 1.8;
    color: rgba(240,238,232,0.92);
    font-weight: 400;
    word-break: keep-all;
  }
  .sentence .hw {
    font-size: calc(19px * 1.25);
    font-weight: 700;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    display: inline;
    border-bottom: 2px dashed var(--accent-border);
    padding-bottom: 2px;
  }
  .front-footer {
    padding: 0 30px 24px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .deco-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, #a0c4ff 60%, transparent 100%);
  }

  /* ── BACK ── */
  .back {
    background: var(--back-bg);
    transform: rotateY(180deg);
  }
  .back-header {
    background: #0B0F1A;
    padding: 24px 28px 20px;
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .back-word {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .back-pos { 
    font-size: 12px; 
    color: var(--accent); 
    letter-spacing: 0.1em; 
    font-weight: 600; 
  }
  
  /* 콘텐츠가 길어질 경우 대비한 내부 스크롤바 최적화 */
  .back-body {
    flex: 1;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
  }
  .back-body::-webkit-scrollbar {
    width: 5px;
  }
  .back-body::-webkit-scrollbar-thumb {
    background-color: rgba(0, 0, 0, 0.15);
    border-radius: 99px;
  }
  
  .meaning-block { 
    display: flex; 
    flex-direction: column; 
    gap: 4px; 
  }
  .meaning-num { 
    font-size: 10px; 
    color: #185FA5; 
    font-weight: 700; 
    letter-spacing: 0.08em; 
    margin-bottom: 2px;
  }
  .meaning-text { 
    font-size: 15.5px; 
    color: #000000 !important; 
    font-weight: 600; 
    line-height: 1.5; 
    word-break: keep-all; 
    overflow-wrap: break-word; 
    font-family: var(--font-ko);
    display: block;
  }
  .meaning-sub {
    font-size: 14px;
    color: #333333;
    font-weight: 500;
    line-height: 1.45;
    display: block;
    padding-left: 4px;
    margin-top: 2px;
    font-family: var(--font-ko);
    word-break: keep-all;
  }
  
  .rule { 
    height: 1px; 
    background: var(--back-rule); 
    margin: 4px 0;
  }
  .ex-block {
    background: var(--back-ex-bg);
    border-left: 4px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ex-eng { 
    font-size: 13.5px; 
    color: #2b2b2b; 
    line-height: 1.65; 
  }
  .ex-eng strong { 
    color: #185FA5; 
    font-weight: 700; 
    font-family: 'Playfair Display', serif;
    font-size: 14.5px;
  }
  .ex-kor { 
    font-size: 13px; 
    color: #000000; 
    font-weight: 700; 
    line-height: 1.6; 
    font-family: var(--font-ko);
    word-break: keep-all;
  }
  
  .back-deco {
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, rgba(124,167,235,0.4) 40%, var(--accent) 100%);
  }

  /* ── NAVIGATION ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 2rem;
  }
  .nav-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    font-family: 'DM Sans', var(--font-ko);
    font-size: 13px;
    font-weight: 600;
    padding: 11px 26px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .nav-btn:hover:not(:disabled) { 
    background: rgba(255,255,255,0.08); 
    border-color: rgba(255,255,255,0.2); 
    color: var(--text); 
  }
  .nav-btn:disabled { 
    opacity: 0.15; 
    cursor: default; 
  }
  .flip-btn {
    background: var(--accent);
    border: none;
    color: #0B0F1A;
    font-family: 'DM Sans', var(--font-ko);
    font-size: 14px;
    font-weight: 700;
    padding: 11px 36px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 15px rgba(124, 167, 235, 0.3);
  }
  .flip-btn:hover { 
    opacity: 0.95;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124, 167, 235, 0.4);
  }

  /* ── WORD LIST ── */
  .wordlist {
    width: 100%;
    max-width: 720px;
    margin-top: 3rem;
    padding: 0 1.5rem 4rem;
  }
  .wordlist-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  /* 모바일/데스크톱 대응 최대 높이 제한 및 목록 내부 스크롤화 */
  .wordlist-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 220px;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .wordlist-grid::-webkit-scrollbar {
    width: 4px;
  }
  .wordlist-grid::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
  }
  
  .word-chip {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .word-chip:hover { 
    border-color: rgba(124,167,235,0.4); 
    color: var(--accent); 
    background: rgba(124,167,235,0.05);
  }
  .word-chip.active { 
    background: var(--accent-dim); 
    border-color: var(--accent); 
    color: var(--accent); 
    font-weight: 600; 
    box-shadow: 0 0 12px rgba(124, 167, 235, 0.15);
  }

  @media (max-width: 480px) {
    :root { --card-w: calc(100vw - 2rem); --card-h: 510px; }
    header { padding: 1.5rem 1rem 1rem; }
    .brand { font-size: 12px; }
    .home-btn { padding: 4px 10px; font-size: 10px; }
    .nav { gap: 10px; width: 100%; padding: 0 1rem; }
    .nav-btn { flex: 1; padding: 11px 0; text-align: center; }
    .flip-btn { flex: 1.5; padding: 11px 0; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="home-btn">← 메인</a>
    <span class="brand">민쌤영어 · English Lab</span>
  </div>
  <span class="set-label">Vocabulary Set 06</span>
</header>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:2%"></div></div>
  <span class="progress-text" id="progressText">1 / 50</span>
</div>

<div class="stage" id="stage" tabindex="0" role="button" aria-label="카드 뒤집기">
  <div class="card" id="card">
    <div class="face front" id="frontFace">
      <div class="front-topbar">
        <span class="front-label">민쌤영어 · vocab</span>
        <span class="pos-pill" id="fPos">n.</span>
      </div>
      <div class="front-body">
        <p class="sentence" id="fSentence"></p>
      </div>
      <div class="front-footer">탭하거나 스페이스바로 뜻 확인 →</div>
      <div class="deco-bar"></div>
    </div>
    <div class="face back">
      <div class="back-header">
        <div class="back-word" id="bWord"></div>
        <div class="back-pos" id="bPos"></div>
      </div>
      <div class="back-body" id="bBody"></div>
      <div class="back-deco"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="btnPrev" onclick="go(-1)">← 이전</button>
  <button class="flip-btn" onclick="flip()">뒤집기</button>
  <button class="nav-btn" id="btnNext" onclick="go(1)">다음 →</button>
</div>

<div class="wordlist">
  <div class="wordlist-title">Set 06 단어 목록</div>
  <div class="wordlist-grid" id="wordGrid"></div>
</div>

<script>
const DATA = [
  {
    word: "distress", pos: "n. / v.",
    meanings: [
      { num:"①", text:"(n.) (심한) 고통, 괴로움" },
      { num:"②", text:"(n.) (위험·위기) 곤경, 조난 (in distress 괴로워하여 / 조난 상태인)" },
      { num:"③", text:"(v.) 괴롭히다, 고통을 주다 (distressing a. 괴로운, 충격적인)" }
    ],
    sentence: "The prolonged uncertainty surrounding her medical diagnosis caused considerable psychological {distress}, affecting her ability to concentrate and maintain normal daily routines.",
    translation: "그녀의 의학적 진단을 둘러싼 장기간의 불확실성은 상당한 심리적 고통을 야기하여, 집중하고 정상적인 일상 루틴을 유지하는 능력에 영향을 미쳤다."
  },
  {
    word: "draft", pos: "n. / v.",
    meanings: [
      { num:"①", text:"(n.) (글의) 초안 / (군) 징병, 징집 / (수표) 어음" },
      { num:"②", text:"(n.) (맥주) 생맥주 / (공기의) 외풍, 통풍" },
      { num:"③", text:"(v.) 초안을 작성하다 / (군에) 징집하다 / 드래프트로 선발하다" }
    ],
    sentence: "The committee spent three weeks {drafting} a revised version of the treaty, carefully negotiating the precise wording of each clause to satisfy all parties involved.",
    translation: "위원회는 관련된 모든 당사자들을 만족시키기 위해 각 조항의 정확한 표현을 신중하게 협상하며 조약의 개정안을 작성하는 데 3주를 보냈다."
  },
  {
    word: "dull", pos: "a. / v.",
    meanings: [
      { num:"①", text:"(a.) (내용·상황이) 지루한, 따분한 ↔ exciting" },
      { num:"②", text:"(a.) (감각·날이) 둔한, 무딘 / (색·빛이) 칙칙한 / (날씨가) 흐린" },
      { num:"③", text:"(v.) (감각·고통을) 둔하게 하다, 약화시키다" }
    ],
    sentence: "Prolonged exposure to stress is known to {dull} emotional responsiveness over time, making it increasingly difficult for individuals to experience either intense pleasure or acute distress.",
    translation: "장기간의 스트레스 노출은 시간이 지남에 따라 감정적 반응성을 둔하게 하여, 개인이 강렬한 즐거움이나 극심한 고통을 경험하기 점점 더 어렵게 만드는 것으로 알려져 있다."
  },
  {
    word: "erupt", pos: "v.",
    meanings: [
      { num:"①", text:"(화산이) 폭발하다, 분출하다" },
      { num:"②", text:"(감정·분쟁이) 갑자기 터지다, 발생하다" },
      { num:"③", text:"(피부에) 발진이 생기다 (eruption n. 분출, 폭발)" }
    ],
    sentence: "Violence {erupted} across several districts of the capital following the announcement of the disputed election results, prompting the government to impose an emergency curfew.",
    translation: "논란이 된 선거 결과 발표 후 수도의 여러 구역에서 폭력이 터졌으며, 이에 정부는 긴급 통금령을 부과했다."
  },
  {
    word: "forgive", pos: "v.",
    meanings: [
      { num:"①", text:"(잘못을) 용서하다, 사면하다 (forgive A for B A의 B를 용서하다)" },
      { num:"②", text:"(빚을) 탕감하다" },
      { num:"③", text:"forgiveness n. 용서 / forgiving a. 관대한" }
    ],
    sentence: "Psychologists argue that the ability to {forgive} others, while demanding considerable emotional effort, is ultimately more beneficial to the person doing the forgiving than to the recipient.",
    translation: "심리학자들은 타인을 용서하는 능력이 상당한 감정적 노력을 요구하지만, 궁극적으로는 용서받는 사람보다 용서하는 사람에게 더 이롭다고 주장한다."
  },
  {
    word: "infer", pos: "v.",
    meanings: [
      { num:"①", text:"(증거·정보로) 추론하다, 결론짓다" },
      { num:"②", text:"(간접적으로) 암시하다" },
      { num:"※", text:"imply(화자가 암시)와 구별; infer는 청자가 추론 (inference n. 추론)" }
    ],
    sentence: "From the limited archaeological evidence available, historians can only {infer} that trade networks between the two civilizations were established well before any written records were kept.",
    translation: "이용 가능한 제한된 고고학적 증거로부터, 역사학자들은 두 문명 사이의 무역 네트워크가 어떤 문자 기록이 보관되기 훨씬 이전에 확립되었다고만 추론할 수 있다."
  },
  {
    word: "life expectancy", pos: "n.",
    meanings: [
      { num:"①", text:"기대 수명 (average life expectancy 평균 기대 수명)" },
      { num:"※", text:"통계·의학 지문 필수 표현" }

let current = 0;

function renderSentence(t) {
  return t.replace(/\{([^}]+)\}/g, '<span class="hw">$1</span>');
}

function renderCard(idx) {
  const d = DATA[idx];
  document.getElementById('fPos').textContent = d.pos;
  document.getElementById('fSentence').innerHTML = renderSentence(d.sentence);
  document.getElementById('bWord').textContent = d.word;
  document.getElementById('bPos').textContent = d.pos;

  const exEng = d.sentence.replace(/\{([^}]+)\}/g, '<strong>$1</strong>');
  
  let bodyHtml = '';
  d.meanings.forEach(m => {
    // 1단계: 슬래시(/) 부호를 기준으로 1차적인 분할 전개
    const slashParts = m.text.split('/').map(t => t.trim());
    
    bodyHtml += `<div class="meaning-block">`;
    bodyHtml += `  <span class="meaning-num">${m.num} 의미</span>`;
    
    slashParts.forEach(part => {
      // 2단계: 여는 괄호 '(' 부호 포함 여부를 검증하여 예시 구문을 완전히 하행 처리
      if (part.includes('(')) {
        const openIdx = part.indexOf('(');
        const mainMeaning = part.substring(0, openIdx).trim();
        const subExample = part.substring(openIdx).trim();
        
        // 본래 표기 뜻 출력 (검은색 굵게 상단 고정)
        if (mainMeaning) {
          bodyHtml += `  <span class="meaning-text">${mainMeaning}</span>`;
        }
        // 독립된 개별 하위 행 구조로 괄호 예시문 전개
        if (subExample) {
          bodyHtml += `  <span class="meaning-sub">${subExample}</span>`;
        }
      } else {
        // 괄호가 매칭되지 않는 일반 문자열은 한 줄 단위 단독 요소 배치
        bodyHtml += `  <span class="meaning-text">${part}</span>`;
      }
    });
    
    bodyHtml += `</div>`;
  });
  
  bodyHtml += '<div class="rule"></div>';
  bodyHtml += `<div class="ex-block"><p class="ex-eng">${exEng}</p><p class="ex-kor">${d.translation}</p></div>`;
  
  const bBody = document.getElementById('bBody');
  bBody.innerHTML = bodyHtml;
  
  // 새로운 단어로 넘어갈 때 뒷면 내부 스크롤 위치를 맨 위로 초기화
  bBody.scrollTop = 0;

  document.getElementById('progressFill').style.width = ((idx + 1) / DATA.length * 100).toFixed(1) + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${DATA.length}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === DATA.length - 1;
  
  document.querySelectorAll('.word-chip').forEach((el, i) => el.classList.toggle('active', i === idx));

  // 현재 활성화된 단어 칩 위치를 자동 감지해 칩 목록 뷰를 부드럽게 스크롤링
  const activeChip = document.querySelector('.word-chip.active');
  if (activeChip) {
    activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }

  document.getElementById('card').classList.remove('flipped');
}

function flip() { document.getElementById('card').classList.toggle('flipped'); }
function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= DATA.length) return;
  current = next; renderCard(current);
}

const grid = document.getElementById('wordGrid');
DATA.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'word-chip' + (i === 0 ? ' active' : '');
  btn.textContent = d.word;
  btn.onclick = () => { current = i; renderCard(i); };
  grid.appendChild(btn);
});

document.getElementById('stage').addEventListener('click', flip);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

renderCard(0);
</script>
</body>
</html>
