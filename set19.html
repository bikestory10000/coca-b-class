<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민쌤영어 Vocab · Set 19</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
  /* 범용 디자인 시스템 및 CSS 변수 정밀화 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0B0F1A; 
    --surface: #131929; 
    --accent: #7CA7EB;
    --accent-dim: rgba(124, 167, 235, 0.12); 
    --accent-border: rgba(124, 167, 235, 0.25);
    --text: #F0EEE8; 
    --text-muted: rgba(240, 238, 232, 0.5); 
    --text-dim: rgba(240, 238, 232, 0.25);
    
    /* 백면 세팅 */
    --back-bg: #F8F7F4; 
    --back-text: #111111; 
    --back-muted: #4A4A4A; 
    --back-rule: rgba(0, 0, 0, 0.06); 
    --back-ex-bg: rgba(11, 15, 26, 0.04);
    
    /* 카드 및 컴포넌트 구조 수치 */
    --radius: 24px; 
    --card-w: 400px; 
    --card-h: 540px;
    
    /* 프리미엄 폰트 스택 */
    --font-ko: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-en: 'DM Sans', sans-serif;
    --font-serif: 'Playfair Display', Georgia, serif;
  }

  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: var(--font-en); 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  /* 글로벌 웹킷 스크롤바 커스텀 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

  /* 헤더 및 홈 링크 고도화 */
  header { 
    width: 100%; 
    max-width: 900px; 
    padding: 2.5rem 2rem 1.2rem; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    margin-bottom: 2rem; 
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .home-btn {
    font-family: var(--font-ko);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: all 0.2s ease;
  }
  .home-btn:hover {
    color: var(--accent);
    background: var(--accent-dim);
    border-color: var(--accent-border);
  }
  .brand { font-size: 14px; letter-spacing: 0.14em; color: #ffffff; font-weight: 700; text-transform: uppercase; }
  .brand span { color: var(--accent); }
  .set-label { font-size: 13px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.03em; }

  /* 프로그레스 바 */
  .progress-wrap { width: 100%; max-width: 400px; margin-bottom: 1.8rem; padding: 0 1rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .progress-bar-bg { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.06); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #5B86E5, var(--accent)); border-radius: 99px; transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
  .progress-text { font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; font-weight: 600; }

  /* 스테이지 및 3D 입체 플립 카드 시스템 */
  .stage { width: var(--card-w); height: var(--card-h); perspective: 2000px; cursor: pointer; outline: none; }
  .card { 
    width: 100%; 
    height: 100%; 
    position: relative; 
    transform-style: preserve-3d; 
    transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1); 
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35), 0 5px 15px rgba(0, 0, 0, 0.2);
    border-radius: var(--radius);
  }
  
  /* 뒤집힐 때 입체감 전환 효과 */
  .card.flipped { 
    transform: rotateY(180deg); 
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15), 0 5px 15px rgba(0, 0, 0, 0.08);
  }
  
  .face { position: absolute; inset: 0; border-radius: var(--radius); backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; }
  
  /* 카드 앞면 (Dark 프리미엄) */
  .front { background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.06); display: flex; flex-direction: column; }
  .front-topbar { display: flex; align-items: center; justify-content: space-between; padding: 26px 28px 0; }
  .front-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
  .pos-pill { font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-border); padding: 4px 14px; border-radius: 99px; font-weight: 600; letter-spacing: 0.05em; font-style: italic; }
  .front-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 34px; }
  
  /* 영문 코퍼스 타이포그래피 */
  .sentence { font-size: 18px; line-height: 1.8; color: rgba(240, 238, 232, 0.9); font-weight: 400; letter-spacing: -0.01em; }
  .sentence .hw { font-family: var(--font-serif); font-size: 24px; font-weight: 700; color: var(--accent); display: inline; margin-right: 2px; text-underline-offset: 4px; }
  .front-footer { padding: 0 34px 24px; font-size: 12px; color: var(--text-muted); text-align: center; letter-spacing: 0.05em; font-family: var(--font-ko); font-weight: 500; opacity: 0.8; }
  .deco-bar { height: 4px; background: linear-gradient(90deg, var(--accent) 0%, #5B86E5 50%, transparent 100%); }

  /* 카드 뒷면 (Light 아카데믹 텍스트북 스타일) */
  .back { background: var(--back-bg); transform: rotateY(180deg); display: flex; flex-direction: column; border: 1px solid rgba(0, 0, 0, 0.08); }
  .back-header { background: #0F1424; padding: 26px 28px 22px; border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0; }
  .back-word { font-family: var(--font-serif); font-size: 36px; font-weight: 700; color: #ffffff; line-height: 1.1; letter-spacing: -0.02em; }
  .back-pos { font-size: 12px; color: var(--accent); letter-spacing: 0.1em; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
  
  /* 내부 스크롤바 방어 코드 및 커스텀 트랙 */
  .back-body { flex: 1; padding: 22px 26px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; scroll-behavior: smooth; }
  .back-body::-webkit-scrollbar { width: 5px; }
  .back-body::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 99px; }
  .back-body::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.25); }
  
  /* 아카데믹 한국어 폰트 매핑 및 가독성 최적화 */
  .meaning-block { display: flex; flex-direction: column; gap: 4px; font-family: var(--font-ko); }
  .meaning-num { font-size: 10px; color: #185FA5; font-weight: 800; letter-spacing: 0.08em; }
  .meaning-text { font-size: 15.5px; color: var(--back-text) !important; font-weight: 700; line-height: 1.65; word-break: keep-all; }
  .meaning-sub { font-size: 13.5px; color: var(--back-muted); font-weight: 500; line-height: 1.6; display: block; padding-left: 6px; margin-top: 2px; border-left: 2px solid rgba(0, 0, 0, 0.08); }
  
  .rule { height: 1px; background: var(--back-rule); margin: 4px 0; }
  .ex-block { background: var(--back-ex-bg); border-left: 4px solid #185FA5; border-radius: 0 12px 12px 0; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
  .ex-eng { font-size: 13.5px; color: #222222; line-height: 1.65; font-weight: 400; letter-spacing: -0.01em; }
  .ex-eng strong { color: #185FA5; font-weight: 700; font-family: var(--font-serif); font-size: 15px; }
  .ex-kor { font-size: 13.5px; color: #000000; font-weight: 600; line-height: 1.65; font-family: var(--font-ko); word-break: keep-all; }
  .back-deco { height: 4px; background: linear-gradient(90deg, transparent 0%, rgba(24, 95, 165, 0.2) 50%, #185FA5 100%); }

  /* 컨트롤 컨트롤러 네비게이션 */
  .nav { display: flex; align-items: center; gap: 16px; margin-top: 2.2rem; }
  .nav-btn { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text); font-family: var(--font-ko); font-size: 13.5px; font-weight: 600; padding: 11px 26px; border-radius: 99px; cursor: pointer; transition: all 0.2s ease; letter-spacing: -0.02em; }
  .nav-btn:hover:not(:disabled) { background: rgba(124, 167, 235, 0.08); border-color: var(--accent-border); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.15; cursor: not-allowed; }
  .flip-btn { background: linear-gradient(135deg, var(--accent), #5B86E5); border: none; color: #0B0F1A; font-family: var(--font-ko); font-size: 14px; font-weight: 700; padding: 11px 36px; border-radius: 99px; cursor: pointer; transition: all 0.25s ease; box-shadow: 0 4px 15px rgba(124, 167, 235, 0.25); letter-spacing: -0.02em; }
  .flip-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124, 167, 235, 0.4); opacity: 0.95; }

  /* 하단 단어 그리드 및 스마트 뷰포트 제한 스크롤 컴포넌트 */
  .wordlist { width: 100%; max-width: 750px; margin-top: 3.5rem; padding: 0 1.5rem 4rem; }
  .wordlist-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; font-weight: 600; font-family: var(--font-ko); }
  
  /* 세로 제한 스크롤 뷰 구현 */
  .wordlist-grid { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    max-height: 180px; 
    overflow-y: auto; 
    padding: 6px 4px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.01);
    scroll-behavior: smooth;
  }
  .wordlist-grid::-webkit-scrollbar { width: 4px; }
  .wordlist-grid::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 99px; }

  .word-chip { 
    font-size: 12.5px; 
    padding: 6px 14px; 
    border-radius: 99px; 
    border: 1px solid rgba(255, 255, 255, 0.08); 
    color: rgba(255, 255, 255, 0.7); 
    cursor: pointer; 
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
    background: transparent; 
    font-family: var(--font-en);
    font-weight: 500;
  }
  .word-chip:hover { border-color: var(--accent-border); color: #ffffff; background: rgba(255, 255, 255, 0.02); }
  .word-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; box-shadow: inset 0 0 8px rgba(124, 167, 235, 0.1); }

  @media (max-width: 480px) { 
    :root { --card-w: calc(100vw - 2rem); --card-h: 520px; } 
    header { padding: 1.5rem 1rem 1rem; margin-bottom: 1.2rem; } 
    .home-btn { padding: 5px 10px; font-size: 11px; }
    .brand { font-size: 12px; }
    .nav { gap: 10px; }
    .nav-btn { padding: 10px 18px; font-size: 12px; }
    .flip-btn { padding: 10px 28px; font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="home-btn">← 메인으로</a>
    <span class="brand">민쌤영어 <span>·</span> English Lab</span>
  </div>
  <span class="set-label">Vocabulary Set 19</span>
</header>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">1 / 58</span>
</div>

<div class="stage" id="stage" tabindex="0" role="button" aria-label="카드 뒤집기">
  <div class="card" id="card">
    <div class="face front">
      <div class="front-topbar">
        <span class="front-label">민쌤영어 · vocab</span>
        <span class="pos-pill" id="fPos">n.</span>
      </div>
      <div class="front-body">
        <p class="sentence" id="fSentence"></p>
      </div>
      <div class="front-footer">탭하거나 스페이스바로 뜻 확인 →</div>
      <div class="deco-bar"></div>
    </div>
    <div class="face back">
      <div class="back-header">
        <div class="back-word" id="bWord"></div>
        <div class="back-pos" id="bPos"></div>
      </div>
      <div class="back-body" id="bBody"></div>
      <div class="back-deco"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="btnPrev" onclick="go(-1)">← 이전 단어</button>
  <button class="flip-btn" onclick="flip()">정답 확인</button>
  <button class="nav-btn" id="btnNext" onclick="go(1)">다음 단어 →</button>
</div>

<div class="wordlist">
  <div class="wordlist-title">Set 19 단어 목록</div>
  <div class="wordlist-grid" id="wordGrid"></div>
</div>

<script>
// 구조 일관성 유지를 위한 데이터 객체
const DATA = [
  {
    word: "durable", pos: "a.",
    meanings: [
      { num:"①", text:"(물건이) 내구성이 있는, 오래가는 ↔ fragile / (관계·효과가) 지속적인" },
      { num:"②", text:"(durable goods 내구재) (durable peace 지속적인 평화)" }
    ],
    sentence: "Achieving a {durable} peace requires more than the cessation of armed hostilities; it demands the construction of legitimate institutions capable of resolving disputes peacefully, distributing resources equitably, and incorporating the interests of all significant stakeholders.",
    translation: "지속적인 평화를 달성하려면 무장 적대 행위의 중단 이상이 필요하다. 그것은 분쟁을 평화적으로 해결하고, 자원을 공평하게 분배하며, 모든 중요한 이해관계자들의 이익을 통합할 수 있는 정당한 기관들의 구축을 요구한다."
  },
  {
    word: "elect", pos: "v. / a.",
    meanings: [
      { num:"①", text:"(v.) (투표로) 선출하다, 선거하다 / (격식) (하기로) 선택하다" },
      { num:"②", text:"(a.) (취임 전) 당선된" },
      { num:"③", text:"(president-elect 당선인) (elect to do ~하기로 선택하다)" }
    ],
    sentence: "Several board members {elected} not to stand for reappointment, citing the increasing time demands of the role and their assessment that fresh perspectives would better serve the organization at the current stage of its development.",
    translation: "여러 이사회 구성원들은 역할의 증가하는 시간적 요구와 신선한 관점이 현재 발전 단계의 조직에 더 잘 기여할 것이라는 평가를 이유로 재임명을 위한 입후보를 하지 않기로 선택했다."
  },
  {
    word: "enslave", pos: "v.",
    meanings: [
      { num:"①", text:"(사람을) 노예로 만들다 / (비유) 종속시키다, 사로잡다" },
      { num:"②", text:"(be enslaved to habit 습관의 노예가 되다)" }
    ],
    sentence: "Critics of the attention economy argue that platforms deliberately {enslave} users to habitual engagement patterns by exploiting psychological vulnerabilities, creating dependency relationships that users find difficult to recognize, let alone escape.",
    translation: "주의 경제 비평가들은 플랫폼들이 사용자들이 인식하기 어렵고 탈출하기는 더욱 어려운 의존 관계를 만들면서 심리적 취약성을 이용하여 의도적으로 사용자들을 습관적인 참여 패턴에 종속시킨다고 주장한다."
  },
  {
    word: "ephemeral", pos: "a.",
    meanings: [
      { num:"①", text:"(존재·효과가) 수명이 짧은, 덧없는, 일시적인 ↔ permanent" },
      { num:"②", text:"(ephemeral trend 일시적인 유행)" },
      { num:"③", text:"※ temporary보다 시적·철학적 뉘앙스; 곧 사라지는 것 강조" }
    ],
    sentence: "The {ephemeral} nature of digital content — its susceptibility to deletion, alteration, and platform dependency — poses significant challenges for historians attempting to construct reliable archives of contemporary culture and public discourse.",
    translation: "디지털 콘텐츠의 덧없는 특성 — 삭제, 변경, 그리고 플랫폼 의존성에 대한 취약성 — 은 현대 문화와 공개 담론의 신뢰할 수 있는 기록을 구성하려는 역사학자들에게 상당한 도전을 제기한다."
  },
  {
    word: "erode", pos: "v.",
    meanings: [
      { num:"①", text:"(토양·암석을) 침식시키다, 부식시키다 / (권리·가치를) 약화시키다, 잠식하다" },
      { num:"②", text:"(erode confidence 자신감을 약화시키다)" },
      { num:"③", text:"(erosion n. 침식; eroding a. 침식하는)" }
    ],
    sentence: "Repeated compromises on enforcement, each justified individually as pragmatic accommodation, collectively {eroded} the regulatory framework to the point where it could no longer serve the protective function for which it had been designed.",
    translation: "각각 개별적으로 실용적 수용으로 정당화된 집행에 대한 반복된 타협들은 집합적으로 규제 체계가 그것이 설계된 보호 기능을 더 이상 수행할 수 없는 지점까지 잠식했다."
  },
  {
    word: "expedition", pos: "n.",
    meanings: [
      { num:"①", text:"(특정 목적의) 탐험, 원정 / 원정대 / (비격식) 나들이" },
      { num:"②", text:"(polar expedition 극지 탐험)" }
    ],
    sentence: "The scientific {expedition} to the deep ocean floor yielded data that significantly challenged prevailing assumptions about the conditions necessary to sustain biological life, opening new lines of inquiry with implications extending well beyond marine biology.",
    translation: "심해 해저로의 과학적 탐험은 생물학적 생명을 유지하는 데 필요한 조건에 대한 기존 가정에 크게 도전하는 데이터를 산출했으며, 해양 생물학을 훨씬 넘어서는 함의를 가진 새로운 탐구 방향을 열었다."
  },
  {
    word: "fastidious", pos: "a.",
    meanings: [
      { num:"①", text:"(기준이) 꼼꼼한, 세심한 / (취향이) 까다로운, 가리는 것이 많은" },
      { num:"②", text:"(fastidious attention to detail 세부사항에 꼼꼼한 주의)" },
      { num:"③", text:"※ meticulous와 유사하나 불결함에 대한 예민한 거부감 강조" }
    ],
    sentence: "His {fastidious} attention to the accuracy of citations and the precise attribution of ideas to their original sources set a standard of scholarly rigor that his graduate students initially found demanding but ultimately came to regard as foundational to good academic practice.",
    translation: "인용의 정확성과 아이디어를 원래 출처에 정확하게 귀속시키는 것에 대한 그의 꼼꼼한 주의는 그의 대학원생들이 처음에는 까다롭다고 느꼈지만 결국 좋은 학문적 관행의 토대로 여기게 된 학문적 엄밀함의 기준을 세웠다."

let current = 0;

function renderSentence(t) {
  return t.replace(/\{([^}]+)\}/g, '<span class="hw">$1</span>');
}

function renderCard(idx) {
  const d = DATA[idx];
  document.getElementById('fPos').textContent = d.pos;
  document.getElementById('fSentence').innerHTML = renderSentence(d.sentence);
  document.getElementById('bWord').textContent = d.word;
  document.getElementById('bPos').textContent = d.pos;

  const exEng = d.sentence.replace(/\{([^}]+)\}/g, '<strong>$1</strong>');
  let bodyHtml = '';
  d.meanings.forEach(m => {
    const slashParts = m.text.split('/').map(t => t.trim());
    
    bodyHtml += `<div class="meaning-block">`;
    bodyHtml += `  <span class="meaning-num">${m.num}</span>`;
    
    slashParts.forEach(part => {
      if (part.includes('(')) {
        const openIdx = part.indexOf('(');
        const mainMeaning = part.substring(0, openIdx).trim();
        const subExample = part.substring(openIdx).trim();
        
        if (mainMeaning) {
          bodyHtml += `  <span class="meaning-text">${mainMeaning}</span>`;
        }
        if (subExample) {
          bodyHtml += `  <span class="meaning-sub">${subExample}</span>`;
        }
      } else {
        bodyHtml += `  <span class="meaning-text">${part}</span>`;
      }
    });
    
    bodyHtml += `</div>`;
  });
  
  bodyHtml += '<div class="rule"></div>';
  bodyHtml += `<div class="ex-block"><p class="ex-eng">${exEng}</p><p class="ex-kor">${d.translation}</p></div>`;
  
  const bBody = document.getElementById('bBody');
  bBody.innerHTML = bodyHtml;
  bBody.scrollTop = 0; // 단어 변경 시 카드 스크롤 위치 초기화 방어 코드

  // 진행 상태바 반영
  document.getElementById('progressFill').style.width = ((idx + 1) / DATA.length * 100).toFixed(1) + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${DATA.length}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === DATA.length - 1;
  
  // 단어 칩 동기화 및 스크롤 추적
  document.querySelectorAll('.word-chip').forEach((el, i) => {
    const isActive = i === idx;
    el.classList.toggle('active', isActive);
    
    // UX 핵심: 현재 인덱스에 매칭되는 단어 칩으로 컨테이너 스크롤 포커싱 자동 이동
    if (isActive) {
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    }
  });
  
  document.getElementById('card').classList.remove('flipped');
}

function flip() { document.getElementById('card').classList.toggle('flipped'); }
function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= DATA.length) return;
  current = next; renderCard(current);
}

// 단어 목록 그리드 초기 생성
const grid = document.getElementById('wordGrid');
DATA.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'word-chip' + (i === 0 ? ' active' : '');
  btn.textContent = d.word;
  btn.onclick = () => { current = i; renderCard(i); };
  grid.appendChild(btn);
});

document.getElementById('stage').addEventListener('click', flip);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

// 초기화 가동
renderCard(0);
</script>
