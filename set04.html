<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민쌤영어 Vocab · Set 04</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0F1A;
    --surface: #131929;
    --surface-hover: #192136;
    --accent: #7CA7EB;
    --accent-glow: rgba(124, 167, 235, 0.25);
    --accent-dim: rgba(124,167,235,0.14);
    --accent-border: rgba(124,167,235,0.28);
    --text: #F0EEE8;
    --text-muted: rgba(240,238,232,0.55);
    --text-dim: rgba(240,238,232,0.25);
    
    /* 카드 뒷면 프리미엄 라이트 테마 변수 */
    --back-bg: #F7F5F0;
    --back-text: #111111;
    --back-muted: #555555;
    --back-rule: rgba(0,0,0,0.06);
    --back-ex-bg: rgba(11,15,26,0.04);
    
    --radius: 22px;
    --card-w: 400px;
    --card-h: 540px;
    
    /* 폰트 스택 최적화 */
    --font-ko: 'Pretendard', 'Malgun Gothic', sans-serif;
  }

  body {
    background: var(--bg);
    background: radial-gradient(circle at top center, #161f36 0%, var(--bg) 70%);
    color: var(--text);
    font-family: 'DM Sans', var(--font-ko);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 900px;
    padding: 2.5rem 2rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 2rem;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .home-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    text-decoration: none;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
  }
  .home-btn:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .brand { 
    font-size: 14px; 
    letter-spacing: 0.14em; 
    color: var(--accent); 
    font-weight: 600; 
    text-transform: uppercase; 
  }
  .set-label { 
    font-size: 13px; 
    color: var(--text-muted); 
    font-weight: 500;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 400px;
    margin-bottom: 1.8rem;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a0c4ff);
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-text {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* ── CARD STAGE ── */
  .stage {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 2000px;
    cursor: pointer;
    outline: none;
    margin-bottom: 0.5rem;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 5px 15px rgba(0, 0, 0, 0.2);
    border-radius: var(--radius);
  }
  
  /* 마우스 오버 및 활성화 상태 입체감 증폭 */
  .stage:hover .card {
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px var(--accent-glow);
  }
  .stage:focus-visible .card { 
    box-shadow: 0 0 0 3px var(--accent); 
  }

  /* 카드 플립 애니메이션 조정 (그림자 반전 포함) */
  .card.flipped { 
    transform: rotateY(180deg); 
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── FRONT ── */
  .front {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .front-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px 0;
  }
  .front-label { 
    font-size: 11px; 
    letter-spacing: 0.14em; 
    text-transform: uppercase; 
    color: var(--text-dim); 
    font-weight: 600; 
  }
  .pos-pill {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .front-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px 34px;
  }
  .sentence {
    font-size: 19px;
    line-height: 1.8;
    color: rgba(240,238,232,0.92);
    font-weight: 400;
    word-break: keep-all;
  }
  .sentence .hw {
    font-size: calc(19px * 1.25);
    font-weight: 700;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    display: inline;
    border-bottom: 2px dashed var(--accent-border);
    padding-bottom: 2px;
  }
  .front-footer {
    padding: 0 30px 24px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .deco-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, #a0c4ff 60%, transparent 100%);
  }

  /* ── BACK ── */
  .back {
    background: var(--back-bg);
    transform: rotateY(180deg);
  }
  .back-header {
    background: #0B0F1A;
    padding: 24px 28px 20px;
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .back-word {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .back-pos { 
    font-size: 12px; 
    color: var(--accent); 
    letter-spacing: 0.1em; 
    font-weight: 600; 
  }
  
  /* 콘텐츠가 길어질 경우 대비한 내부 스크롤바 최적화 */
  .back-body {
    flex: 1;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
  }
  .back-body::-webkit-scrollbar {
    width: 5px;
  }
  .back-body::-webkit-scrollbar-thumb {
    background-color: rgba(0, 0, 0, 0.15);
    border-radius: 99px;
  }
  
  .meaning-block { 
    display: flex; 
    flex-direction: column; 
    gap: 4px; 
  }
  .meaning-num { 
    font-size: 10px; 
    color: #185FA5; 
    font-weight: 700; 
    letter-spacing: 0.08em; 
    margin-bottom: 2px;
  }
  .meaning-text { 
    font-size: 15.5px; 
    color: #000000 !important; 
    font-weight: 600; 
    line-height: 1.5; 
    word-break: keep-all; 
    overflow-wrap: break-word; 
    font-family: var(--font-ko);
    display: block;
  }
  .meaning-sub {
    font-size: 14px;
    color: #333333;
    font-weight: 500;
    line-height: 1.45;
    display: block;
    padding-left: 4px;
    margin-top: 2px;
    font-family: var(--font-ko);
    word-break: keep-all;
  }
  
  .rule { 
    height: 1px; 
    background: var(--back-rule); 
    margin: 4px 0;
  }
  .ex-block {
    background: var(--back-ex-bg);
    border-left: 4px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ex-eng { 
    font-size: 13.5px; 
    color: #2b2b2b; 
    line-height: 1.65; 
  }
  .ex-eng strong { 
    color: #185FA5; 
    font-weight: 700; 
    font-family: 'Playfair Display', serif;
    font-size: 14.5px;
  }
  .ex-kor { 
    font-size: 13px; 
    color: #000000; 
    font-weight: 700; 
    line-height: 1.6; 
    font-family: var(--font-ko);
    word-break: keep-all;
  }
  
  .back-deco {
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, rgba(124,167,235,0.4) 40%, var(--accent) 100%);
  }

  /* ── NAVIGATION ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 2rem;
  }
  .nav-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    font-family: 'DM Sans', var(--font-ko);
    font-size: 13px;
    font-weight: 600;
    padding: 11px 26px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .nav-btn:hover:not(:disabled) { 
    background: rgba(255,255,255,0.08); 
    border-color: rgba(255,255,255,0.2); 
    color: var(--text); 
  }
  .nav-btn:disabled { 
    opacity: 0.15; 
    cursor: default; 
  }
  .flip-btn {
    background: var(--accent);
    border: none;
    color: #0B0F1A;
    font-family: 'DM Sans', var(--font-ko);
    font-size: 14px;
    font-weight: 700;
    padding: 11px 36px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 15px rgba(124, 167, 235, 0.3);
  }
  .flip-btn:hover { 
    opacity: 0.95;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124, 167, 235, 0.4);
  }

  /* ── WORD LIST ── */
  .wordlist {
    width: 100%;
    max-width: 720px;
    margin-top: 3rem;
    padding: 0 1.5rem 4rem;
  }
  .wordlist-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  /* 모바일/데스크톱 대응 최대 높이 제한 및 목록 내부 스크롤화 */
  .wordlist-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 220px;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .wordlist-grid::-webkit-scrollbar {
    width: 4px;
  }
  .wordlist-grid::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
  }
  
  .word-chip {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .word-chip:hover { 
    border-color: rgba(124,167,235,0.4); 
    color: var(--accent); 
    background: rgba(124,167,235,0.05);
  }
  .word-chip.active { 
    background: var(--accent-dim); 
    border-color: var(--accent); 
    color: var(--accent); 
    font-weight: 600; 
    box-shadow: 0 0 12px rgba(124, 167, 235, 0.15);
  }

  @media (max-width: 480px) {
    :root { --card-w: calc(100vw - 2rem); --card-h: 510px; }
    header { padding: 1.5rem 1rem 1rem; }
    .brand { font-size: 12px; }
    .home-btn { padding: 4px 10px; font-size: 10px; }
    .nav { gap: 10px; width: 100%; padding: 0 1rem; }
    .nav-btn { flex: 1; padding: 11px 0; text-align: center; }
    .flip-btn { flex: 1.5; padding: 11px 0; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="home-btn">← 메인</a>
    <span class="brand">민쌤영어 · English Lab</span>
  </div>
  <span class="set-label">Vocabulary Set 04</span>
</header>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:2%"></div></div>
  <span class="progress-text" id="progressText">1 / 46</span>
</div>

<div class="stage" id="stage" tabindex="0" role="button" aria-label="카드 뒤집기">
  <div class="card" id="card">
    <div class="face front" id="frontFace">
      <div class="front-topbar">
        <span class="front-label">민쌤영어 · vocab</span>
        <span class="pos-pill" id="fPos">n.</span>
      </div>
      <div class="front-body">
        <p class="sentence" id="fSentence"></p>
      </div>
      <div class="front-footer">탭하거나 스페이스바로 뜻 확인 →</div>
      <div class="deco-bar"></div>
    </div>
    <div class="face back">
      <div class="back-header">
        <div class="back-word" id="bWord"></div>
        <div class="back-pos" id="bPos"></div>
      </div>
      <div class="back-body" id="bBody"></div>
      <div class="back-deco"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" id="btnPrev" onclick="go(-1)">← 이전</button>
  <button class="flip-btn" onclick="flip()">뒤집기</button>
  <button class="nav-btn" id="btnNext" onclick="go(1)">다음 →</button>
</div>

<div class="wordlist">
  <div class="wordlist-title">Set 04 단어 목록</div>
  <div class="wordlist-grid" id="wordGrid"></div>
</div>

<script>
const DATA = [
  {
    word: "relief", pos: "n.",
    meanings: [
      { num:"①", text:"(걱정·고통 후의) 안도, 안심" },
      { num:"②", text:"(고통·긴장의) 완화, 경감" },
      { num:"③", text:"(재난·빈곤) 구제, 지원 / (조각의) 부조, 돋을새김" }
    ],
    sentence: "International {relief} efforts were hampered by damaged infrastructure and restricted access to the worst-affected areas of the disaster zone.",
    translation: "국제 구제 활동은 피해 지역의 손상된 기반 시설과 재난 지역 중 가장 심각한 피해를 입은 지역에 대한 제한된 접근으로 방해를 받았다."
  },
  {
    word: "restore", pos: "v.",
    meanings: [
      { num:"①", text:"(이전 상태로) 복구하다, 회복시키다" },
      { num:"②", text:"(작품·건물을) 복원하다" },
      { num:"③", text:"(권리·지위를) 돌려주다 (restore confidence 신뢰를 회복하다)" }
    ],
    sentence: "It took years of diplomatic effort to {restore} the trust between the two nations after the border dispute had pushed them to the brink of armed conflict.",
    translation: "국경 분쟁이 두 나라를 무력 충돌 직전까지 몰아간 후, 양국 사이의 신뢰를 회복시키는 데 수년간의 외교적 노력이 필요했다."
  },
  {
    word: "simultaneously", pos: "ad.",
    meanings: [
      { num:"①", text:"동시에, 일제히 (= at the same time)" },
      { num:"②", text:"(simultaneous a. 동시의)" }
    ],
    sentence: "The organization launched its awareness campaign {simultaneously} across thirty countries, coordinating social media, television, and print media to maximize reach.",
    translation: "그 단체는 도달 범위를 극대화하기 위해 소셜 미디어, 텔레비전, 인쇄 매체를 조율하여 30개국에서 동시에 인식 제고 캠페인을 시작했다."
  },
  {
    word: "trigger", pos: "v. / n.",
    meanings: [
      { num:"①", text:"(v.) (반응·사건을) 촉발하다, 유발하다 / (장치를) 작동시키다" },
      { num:"②", text:"(n.) (총의) 방아쇠" },
      { num:"③", text:"(n.) (사건의) 도화선, 계기 (pull the trigger)" }
    ],
    sentence: "The unexpected collapse of a major investment bank {triggered} a global financial crisis that wiped out trillions of dollars in market value within days.",
    translation: "한 주요 투자은행의 예상치 못한 붕괴가 며칠 만에 수조 달러의 시장 가치를 소멸시킨 글로벌 금융 위기를 촉발했다."
  },
  {
    word: "vanish", pos: "v.",
    meanings: [
      { num:"①", text:"(갑자기) 사라지다, 없어지다" },
      { num:"②", text:"(점점) 소멸하다, 자취를 감추다 (vanish into thin air)" }
    ],
    sentence: "Several indigenous languages are predicted to {vanish} entirely within the next generation unless urgent steps are taken to document and revitalize them.",
    translation: "긴급한 조치가 취해지지 않으면 여러 토착 언어들이 다음 세대 내에 완전히 소멸할 것으로 예측된다."
  },
  {
    word: "absurd", pos: "a.",
    meanings: [
      { num:"①", text:"(논리상) 터무니없는, 불합리한" },
      { num:"②", text:"(상황이) 어처구니없는, 우스꽝스러운 (the absurd 부조리 ※ 철학·문학 용어)" }
    ],
    sentence: "It struck many observers as {absurd} that a policy designed to reduce inequality had, in practice, widened the gap between the wealthiest and poorest citizens.",
    translation: "불평등을 줄이기 위해 설계된 정책이 실제로는 가장 부유한 시민과 가장 가난한 시민 사이의 격차를 더 벌려놓았다는 것이 많은 관찰자들에게 터무니없어 보였다."
  },
  {
    word: "anxious", pos: "a.",
    meanings: [
      { num:"①", text:"(결과가 걱정되어) 불안한, 걱정하는 (be anxious about)" },
      { num:"②", text:"(강하게) 바라는, 열망하는 (be anxious to do 몹시 ~하고 싶어하다)" },
      { num:"※", text:"①②는 뉘앙스가 반대이므로 문맥 구별 필수" }
    ],
    sentence: "The young diplomat was {anxious} to prove himself capable of handling complex negotiations independently, without guidance from his superiors.",
    translation: "그 젊은 외교관은 상관의 지도 없이 복잡한 협상을 독립적으로 처리할 수 있다는 것을 간절히 증명하고 싶어했다."
  },
  {
    word: "approval", pos: "n.",
    meanings: [
      { num:"①", text:"(공식적) 승인, 허가" },
      { num:"②", text:"(긍정적) 찬성, 지지 / 호감, 인정 (win approval 승인을 얻다)" },

let current = 0;

function renderSentence(t) {
  return t.replace(/\{([^}]+)\}/g, '<span class="hw">$1</span>');
}

function renderCard(idx) {
  const d = DATA[idx];
  document.getElementById('fPos').textContent = d.pos;
  document.getElementById('fSentence').innerHTML = renderSentence(d.sentence);
  document.getElementById('bWord').textContent = d.word;
  document.getElementById('bPos').textContent = d.pos;

  const exEng = d.sentence.replace(/\{([^}]+)\}/g, '<strong>$1</strong>');
  
  let bodyHtml = '';
  d.meanings.forEach(m => {
    // 슬래시(/)를 기준으로 1차 분할
    const slashParts = m.text.split('/').map(t => t.trim());
    
    bodyHtml += `<div class="meaning-block">`;
    bodyHtml += `  <span class="meaning-num">${m.num} 의미</span>`;
    
    slashParts.forEach(part => {
      // 여는 괄호 '(' 부호 포함 여부 확인
      if (part.includes('(')) {
        const openIdx = part.indexOf('(');
        const mainMeaning = part.substring(0, openIdx).trim();
        const subExample = part.substring(openIdx).trim();
        
        if (mainMeaning) {
          bodyHtml += `  <span class="meaning-text">${mainMeaning}</span>`;
        }
        if (subExample) {
          bodyHtml += `  <span class="meaning-sub">${subExample}</span>`;
        }
      } else {
        bodyHtml += `  <span class="meaning-text">${part}</span>`;
      }
    });
    
    bodyHtml += `</div>`;
  });
  
  bodyHtml += '<div class="rule"></div>';
  bodyHtml += `<div class="ex-block"><p class="ex-eng">${exEng}</p><p class="ex-kor">${d.translation}</p></div>`;
  
  const bBody = document.getElementById('bBody');
  bBody.innerHTML = bodyHtml;
  
  // 새로운 단어로 넘어갈 때 뒷면 내부 스크롤 위치를 맨 위로 초기화
  bBody.scrollTop = 0;

  document.getElementById('progressFill').style.width = ((idx + 1) / DATA.length * 100).toFixed(1) + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${DATA.length}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === DATA.length - 1;
  
  document.querySelectorAll('.word-chip').forEach((el, i) => el.classList.toggle('active', i === idx));

  // 현재 활성화된 단어 칩 위치를 자동 감지해 칩 목록 뷰를 부드럽게 스크롤링
  const activeChip = document.querySelector('.word-chip.active');
  if (activeChip) {
    activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }

  document.getElementById('card').classList.remove('flipped');
}

function flip() { document.getElementById('card').classList.toggle('flipped'); }
function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= DATA.length) return;
  current = next; renderCard(current);
}

const grid = document.getElementById('wordGrid');
DATA.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'word-chip' + (i === 0 ? ' active' : '');
  btn.textContent = d.word;
  btn.onclick = () => { current = i; renderCard(i); };
  grid.appendChild(btn);
});

document.getElementById('stage').addEventListener('click', flip);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

renderCard(0);
</script>
